name: Setup docs.newsfork.com DNS

on:
  workflow_dispatch:

concurrency:
  group: setup-docs-dns
  cancel-in-progress: false

jobs:
  setup:
    name: CNAME docs → nl-public-docs
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cloudflare preflight
        run: node scripts/preflight-cloudflare.mjs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_WORKERS_SUBDOMAIN: ${{ vars.CF_WORKERS_SUBDOMAIN }}

      - name: Configure DNS and Pages custom domain
        run: node scripts/setup-docs-dns.mjs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
