# Deprecated — docs.newsfork.com router Worker

# Push deploy disabled after nl-public-docs cutover (unified docs on Pages custom domain).
# Use workflow_dispatch only if you need to redeploy the legacy router during migration.

name: Deploy docs.newsfork.com router Worker (deprecated)

on:
  workflow_dispatch:

concurrency:
  group: deploy-docs-router
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy docs router Worker
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install router dependencies
        working-directory: workers/docs-router
        run: pnpm install

      - name: Cloudflare preflight
        run: node scripts/preflight-cloudflare.mjs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_WORKERS_SUBDOMAIN: ${{ vars.CF_WORKERS_SUBDOMAIN }}

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/docs-router
          command: deploy
