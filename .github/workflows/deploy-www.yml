name: Deploy marketing-web to Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - "apps/marketing-web/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "scripts/preflight-cloudflare.mjs"
      - "scripts/account-guard.mjs"
      - ".github/workflows/deploy-www.yml"
  workflow_dispatch:

concurrency:
  group: deploy-nl-marketing-web
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare labs-core (workspace install)
        run: node scripts/prepare-labs-core.mjs
        env:
          LABS_CORE_REPO: ${{ vars.LABS_CORE_REPO }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cloudflare preflight
        run: node scripts/preflight-cloudflare.mjs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_WORKERS_SUBDOMAIN: ${{ vars.CF_WORKERS_SUBDOMAIN }}

      - name: Build marketing-web
        run: pnpm --filter marketing-web run build
        env:
          NODE_ENV: production

      - name: Deploy to Cloudflare Pages
        working-directory: apps/marketing-web
        run: pnpm exec wrangler pages deploy out --project-name=nl-marketing-web --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
