name: Deploy account-web to Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - "apps/account-web/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "scripts/preflight-cloudflare.mjs"
      - "scripts/account-guard.mjs"
      - ".github/workflows/deploy-account.yml"
  workflow_dispatch:

concurrency:
  group: deploy-nl-account-web
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter account-web...

      - name: Cloudflare preflight
        run: node scripts/preflight-cloudflare.mjs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_WORKERS_SUBDOMAIN: ${{ vars.CF_WORKERS_SUBDOMAIN }}

      - name: Build account-web
        run: pnpm --filter account-web run build
        env:
          NODE_ENV: production

      - name: apibay URL builder tests
        run: pnpm --filter account-web run test:apibay

      - name: Install Playwright browsers
        run: pnpm --filter account-web exec playwright install chromium

      - name: E2E smoke (static UI)
        run: pnpm --filter account-web run test:e2e

      - name: Deploy to Cloudflare Pages
        working-directory: apps/account-web
        run: pnpm exec wrangler pages deploy out --project-name=nl-account-web --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
