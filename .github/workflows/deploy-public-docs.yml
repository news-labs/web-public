name: Deploy public-docs to Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - "apps/public-docs/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "scripts/preflight-cloudflare.mjs"
      - "scripts/account-guard.mjs"
      - ".github/workflows/deploy-public-docs.yml"
  workflow_dispatch:

concurrency:
  group: deploy-nl-public-docs
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy user docs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cloudflare preflight
        run: node scripts/preflight-cloudflare.mjs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_WORKERS_SUBDOMAIN: ${{ vars.CF_WORKERS_SUBDOMAIN }}

      - name: Build public-docs
        run: pnpm --filter public-docs run build
        env:
          NODE_ENV: production

      - name: Deploy to Cloudflare Pages
        run: pnpm --filter public-docs exec wrangler pages deploy apps/public-docs/dist --project-name=nl-public-docs --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
